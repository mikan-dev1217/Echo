<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background-color: #e4dce8;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
    }
    form {
        background-color: white;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        list-style: none;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        display:block;
        justify-content:space-between;
        align-items:center;
    }
    .header-section {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px 20px 20px;
    }
    input[type="text"],input[type="password"]{
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 70%;
        outline: none;
    }
    button {
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
    }
    button:hover {
        background-color: #1557b0;
    }
    ul{
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 100%;
        outline: none;
        background-color:white;
    }
</style>
</head>
<title>{{user["username"]}}</title>
<body>
<h1>{{user["username"]}}のプロフィール</h1>
<hr>
{% if is_following %}
    <form action="/unfollow/{{user['id']}}"method="post">
        <button type="submit"style="background-color: red;">フォロー解除</button>
    </form>
{% else %}
    <form action="/follow/{{user['id']}}"method="post">
        <button type="submit">フォロー</button>
    </form>
{% endif %}
<hr>
<ul>
<h2>過去の投稿</h2>
    {% for p in posts %}
    <li>
        {{p["content"]}}:{{p["created_at"]}}
    </li>
    {%endfor%}
<hr>
{%if session["user_id"]==user_id%}
    <a href="/edit_profile">編集</a>
{%endif%}
<a href="/">戻る</a>
</ul>
</body>
</html>
