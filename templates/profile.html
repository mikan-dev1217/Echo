<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background-color: #e4dce8;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
    }
    form {
        display: inline-block;
        margin: 0;
        padding: 0;
        background: none;
        border: none;
        box-shadow: none;
}
    .header-section {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px 20px 20px;
    }
    input[type="text"],input[type="password"]{
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 70%;
        outline: none;
    }
    .dm-button{
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        display:inline-block;
        text-decoration:none;
    }
    button {
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
    }
    button:hover {
        background-color: #1557b0;
    }
    ul{
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 100%;
        outline: none;
        background-color:white;
    }
    .button-location{
        display:flex; 
        gap:10px;
    }
</style>
<title>{{user["username"]}}</title>
</head>
<body>
<h1>{{user["username"]}}のプロフィール</h1>
<hr>
<div class="button-location">
{% if is_following %}
    <form action="/unfollow/{{user['id']}}"method="post">
        <button type="submit"style="background-color: red;">フォロー解除</button>
    </form>
{% else %}
    <form action="/follow/{{user['id']}}"method="post">
        <button type="submit">フォロー</button>
    </form>
{% endif %}
{% if session["user_id"]!= user_id %}
    <a href="/messages/{{user['id']}}"class="dm-button">DM</a>
{% endif %}
</div>
<hr>
<ul>
<h2>過去の投稿</h2>
    {% for p in posts %}
    <li>
        {{p["content"]}}:{{p["created_at"]}}
    </li>
    {%endfor%}
<hr>
{%if session["user_id"]==user_id%}
    <a href="/edit_profile">編集</a>
{%endif%}
<a href="/">戻る</a>
</ul>
<div style="position:fixed;left:0; bottom:0; width:100%; background:black; color:white;border-top:1px solid #ddd; display:flex; justify-content:space-around; padding:20px;">
    <a href="/"style="color:white;">🏠</a>
    <a href="/messages"style="color:white;">✉️</a>
    <a href="/user/{{ session['user_id'] }}"style="color:white;">👤</a>
</div>
</body>
</html>
