<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background-color: #e4dce8;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
    }
    form {
        background-color: white;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        list-style: none;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        display:block;
        justify-content:space-between;
        align-items:center;
    }
    .header-section {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px 20px 20px;
    }
    input[type="text"],input[type="password"]{
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 70%;
        outline: none;
    }
    button {
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
    }
    button:hover {
        background-color: #1557b0;
    }
    .my-message {
        background-color: #1a73e8;
        color: white;
        text-align: right;
        border-radius: 12px 12px 0 12px; 
        margin: 10px 15px 10px auto;
        padding: 10px;
        max-width: 70%;
        width: fit-content;
}
    .your-message {
        background: white;
        text-align: left;
        border-radius: 12px 12px 12px 0;
        margin: 10px auto 10px 15px; 
        padding: 10px;
        max-width: 70%;
        width: fit-content;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}
    }
</style>
<title>タイトル</title>
</head>   
<body>
<h1>タイトル</h1>
{% for m in messages %}
{% if m["sender_id"]==session["user_id"] %}
<div class="my-message">
    {{m["content"]}}
</div>
{% else %}
<div class="your-message">
    {{m["content"]}}
</div>
{% endif %}
{% endfor %}
<div style="position: sticky; bottom: 0; background: white; padding: 20px; border-top: 1px solid #ddd;">
    <form action="/send_message/{{ partner_id }}" method="post" style="box-shadow: none; padding: 0;">
        <input type="text" name="content" placeholder="メッセージを入力..." required style="width: 80%;">
        <button type="submit">送信</button>
    </form>
</div>
</body>
</html>
