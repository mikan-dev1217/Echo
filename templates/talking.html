<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background-color: #e4dce8;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
    }
    form {
        background-color: white;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        list-style: none;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        display:block;
        justify-content:space-between;
        align-items:center;
    }
    .header-section {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px 20px 20px;
    }
    input[type="text"],input[type="password"]{
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 70%;
        outline: none;
    }
    button {
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
    }
    button:hover {
        background-color: #1557b0;
    }
    .my-message {
        background-color: #1a73e8;
        color: white;
        text-align: right;
        border-radius: 12px 12px 0 12px; 
        margin: 10px 15px 10px auto;
        padding: 10px;
        max-width: 70%;
        width: fit-content;
}
    .your-message {
        background: white;
        text-align: left;
        border-radius: 12px 12px 12px 0;
        margin: 10px auto 10px 15px; 
        padding: 10px;
        max-width: 70%;
        width: fit-content;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background-color: #accddd;
        color: rgb(19, 8, 8);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1em;
        font-weight: 700;
        text-transform: uppercase;
        flex-shrink: 0;
    }
    .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
    }
    .partner-header {
        display: flex;
        align-items: center;
        gap: 12px;
        background: white;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        position: sticky;
        top: 0;
        z-index: 100;
    }
    .partner-header a {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: inherit;
        flex-grow: 1;
    }
    .partner-header a:hover {
        opacity: 0.7;
    }
    .partner-info h1 {
        margin: 0;
        font-size: 1.2em;
    }
    .back-button {
        font-size: 1.5em;
        font-weight: bold;
        color: inherit;
        text-decoration: none;
        padding: 0;
        background: none;
    }
    .back-button:hover {
        background: none;
    }
</style>
<title>{{partner['username']}}</title>
</head>   
<script>
setInterval(() => {
    fetch(location.href)
    .then(res => res.text())
    .then(html => {
        let doc = new DOMParser().parseFromString(html, "text/html");

        let newMessages = doc.querySelectorAll(".your-message, .my-message");
        let currentMessages = document.querySelectorAll(".your-message, .my-message");

        if(newMessages.length > currentMessages.length){
            let container = document.querySelector("#bottom");

            // 新しいメッセージだけ追加
            for(let i = currentMessages.length; i < newMessages.length; i++){
                container.before(newMessages[i]);
            }

            window.scrollTo(0, document.body.scrollHeight);
        }
    });
}, 3000);
</script>
<body>
    <div style="padding-bottom: 160px; max-width:600px; margin:0 auto; padding:20px;">
        <div class="partner-header">
            <a href="/messages" class="back-button"><</a>
            <a href="/user/{{partner['id']}}" class="partner-info">
                {% if partner["icon"] %}
                    <span class="avatar">
                        <img src="{{ url_for('static', filename='icons/' + partner['icon']) }}" alt="{{ partner['username'] }}のアイコン">
                    </span>
                {% else %}
                    <span class="avatar">{{ partner["username"][0] }}</span>
                {% endif %}
            </a>
            <div>
                <h1 style="margin: 0;"><a href="/user/{{partner['id']}}" style="background:none; color:inherit; padding:0; text-decoration:none;">{{partner['username']}}</a></h1>
            </div>
        </div>
        {% for m in messages %}
        {% if m["sender_id"]==session["user_id"] %}
        <div class="my-message">
            {{m["content"]}}
        </div>
        {% else %}
        <div class="your-message">
            {{m["content"]}}
        </div>
        {% endif %}
        {% endfor %}
        <div id="bottom">
        <div style="position: fixed; bottom: 60px; height:35px;width:600px;background: white; padding: 20px; border-top: 1px solid #ddd;">
            <form action="/messages/send/{{ user_id }}" method="post" style="box-shadow: none; padding: 0;">
                <input type="text" name="content" placeholder="メッセージを入力..." required style="width: 80%;">
                <button type="submit">送信</button>
            </form>
        </div>
        </div>
        <div style="position:fixed;left:0; bottom:140px; bottom:0; width:100%; background:black; color:white;border-top:1px solid #ddd; display:flex; justify-content:space-around; padding:20px;">
            <a href="/"style="color:white;">🏠</a>
            <a href="/messages"style="color:white;">✉️</a>
            <a href="/user/{{ session['user_id'] }}"style="color:white;">👤</a>
    </div>
</div>
<script>
window.scrollTo(0, document.body.scrollHeight);
</script>
</body>
</html>
