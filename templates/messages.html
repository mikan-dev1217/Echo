<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background-color: #e4dce8;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
    }
    form {
        background-color: white;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        list-style: none;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        display:block;
        justify-content:space-between;
        align-items:center;
    }
    .header-section {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px 20px 20px;
    }
    input[type="text"],input[type="password"]{
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 70%;
        outline: none;
    }
    a{
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
    }
    a:hover {
        background-color: #1557b0;
    }
    ul{
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 100%;
        outline: none;
        background-color:white;
    }
    .button-location{
        display:flex; 
        gap:10px;
    }
</style>
</head>
<body>
    <h1>メッセージ一覧</h1>
    {% for t in talks %}
    <div style="background:white; padding:15px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
        <a href="/messages/{{t['partner_id']}}"style="background-color:#1557b0;color:white;">{{ t['partner_name']}}</a>
        {% if t['unread']>0 %}
            <span style="background:red; color:white; border-radius:50%; padding:2px 8px;">{{ t['unread']}}</span>
        {% endif %}
    </div>
    {% endfor %}
    <div style="position:fixed;left:0; bottom:0; width:100%; background:black; color:white;border-top:1px solid #ddd; display:flex; justify-content:space-around; padding:20px;">
        <a href="/"style="color:white;">🏠</a>
        <a href="/messages"style="color:white;">✉️</a>
        <a href="/user/{{ session['user_id'] }}"style="color:white;">👤</a>
    </div>
</body>
</html>
